name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Get cache paths
        id: cache
        run: |
          echo "build=$(go env GOCACHE)" | tee -a $GITHUB_OUTPUT
          echo "module=$(go env GOMODCACHE)" | tee -a $GITHUB_OUTPUT

      - name: Set up cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.cache.outputs.build }}
            ${{ steps.cache.outputs.module }}
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean --skip=sign
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Push OCI artifacts to GHCR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          REPO="ghcr.io/prettygood-software/opentofu-providers/tailscale/tailscale"

          echo "${GITHUB_TOKEN}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

          declare -A PLATFORMS
          PLATFORMS[linux_amd64]="linux:amd64"
          PLATFORMS[linux_arm64]="linux:arm64"
          PLATFORMS[darwin_arm64]="darwin:arm64"

          INDEX_MANIFESTS="[]"

          for platform_key in "${!PLATFORMS[@]}"; do
            IFS=: read -r os arch <<< "${PLATFORMS[$platform_key]}"
            ZIP="dist/terraform-provider-tailscale_${VERSION}_${platform_key}.zip"
            TAG="${VERSION}_${platform_key}"

            echo "::group::Push ${os}/${arch}"
            oras push \
              --artifact-type application/vnd.opentofu.provider-target \
              "${REPO}:${TAG}" \
              "${ZIP}:archive/zip"
            echo "::endgroup::"

            DESCRIPTOR=$(oras manifest fetch "${REPO}:${TAG}" --descriptor)
            DIGEST=$(echo "${DESCRIPTOR}" | jq -r '.digest')
            SIZE=$(echo "${DESCRIPTOR}" | jq -r '.size')

            INDEX_MANIFESTS=$(echo "${INDEX_MANIFESTS}" | jq \
              --arg digest "${DIGEST}" \
              --arg size "${SIZE}" \
              --arg os "${os}" \
              --arg arch "${arch}" \
              '. + [{
                "mediaType": "application/vnd.oci.image.manifest.v1+json",
                "digest": $digest,
                "size": ($size | tonumber),
                "platform": {"os": $os, "architecture": $arch},
                "artifactType": "application/vnd.opentofu.provider-target"
              }]')
          done

          jq -n \
            --argjson manifests "${INDEX_MANIFESTS}" \
            '{
              schemaVersion: 2,
              mediaType: "application/vnd.oci.image.index.v1+json",
              artifactType: "application/vnd.opentofu.provider",
              manifests: $manifests
            }' > /tmp/index.json

          echo "::group::Index manifest"
          jq . /tmp/index.json
          echo "::endgroup::"

          oras manifest push \
            --media-type application/vnd.oci.image.index.v1+json \
            "${REPO}:${VERSION}" \
            /tmp/index.json

          echo "Pushed index to ${REPO}:${VERSION}"
